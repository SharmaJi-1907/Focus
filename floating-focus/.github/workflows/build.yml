# Cloud build: GitHub compiles the app for Linux AND Windows for free.
# You never need Rust on your own machine.
#
# How to trigger:
#   • Push a tag like v6.0.0   →  creates a Release with installers attached
#   • Or: Actions tab → "build installers" → Run workflow (manual)
name: build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04     # produces .deb and .AppImage
          - platform: windows-latest   # produces .msi and setup .exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Floating Focus ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
