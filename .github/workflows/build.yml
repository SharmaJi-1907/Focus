name: build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: floating-focus/src-tauri

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: floating-focus

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: floating-focus-${{ matrix.platform }}
          path: |
            floating-focus/src-tauri/target/release/bundle/deb/*.deb
            floating-focus/src-tauri/target/release/bundle/appimage/*.AppImage
            floating-focus/src-tauri/target/release/bundle/msi/*.msi
            floating-focus/src-tauri/target/release/bundle/nsis/*.exe
